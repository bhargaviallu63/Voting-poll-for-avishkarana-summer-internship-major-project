<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voter Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#1d3557,#457b9d);
}

.login-box{
width:380px;
background:rgba(255,255,255,0.15);
padding:30px;
border-radius:20px;
backdrop-filter:blur(12px);
box-shadow:0 10px 25px rgba(0,0,0,0.4);
color:white;
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
outline:none;
font-size:16px;
}

.options{
display:flex;
justify-content:space-between;
align-items:center;
font-size:14px;
margin:10px 0;
}

button{
width:100%;
padding:12px;
background:#00c853;
border:none;
border-radius:8px;
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#00e676;
}

p{
margin-top:20px;
text-align:center;
}

a{
color:#ffd54f;
text-decoration:none;
}

#message{
margin-top:15px;
text-align:center;
font-weight:bold;
}
</style>

</head>

<body>

<div class="login-box">

<h2>🗳️ Voter Login</h2>

<input type="text" id="voterid" placeholder="Enter Voter ID">

<input type="password" id="password" placeholder="Enter Password">

<div class="options">

<label>
<input type="checkbox" onclick="showPassword()">
Show Password
</label>

<label>
<input type="checkbox">
Remember Me
</label>

</div>

<button onclick="login()">
Login
</button>

<div id="message"></div>

<p>

New User?

<a href="register.html">

Register Here

</a>

</p>

</div>

<script>

function showPassword(){

let pass=document.getElementById("password");

if(pass.type=="password")
pass.type="text";
else
pass.type="password";

}

function login(){

let id=document.getElementById("voterid").value.trim();

let pass=document.getElementById("password").value.trim();

if(id==""||pass==""){

document.getElementById("message").innerHTML="❌ Fill all fields";

document.getElementById("message").style.color="yellow";

return;

}

if(id=="12345" && pass=="vote123"){

localStorage.setItem("loggedIn","true");

document.getElementById("message").innerHTML="✅ Login Successful";

document.getElementById("message").style.color="lightgreen";

setTimeout(function(){

window.location="vote.html";

},1500);

}
else{

document.getElementById("message").innerHTML="❌ Invalid Voter ID or Password";

document.getElementById("message").style.color="red";

}

}

</script>

</body>
</html>
