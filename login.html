<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Voter Login</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="logo">
🗳️ Smart Vote
</div>

<nav>

<a href="index.html">Home</a>

<a href="register.html">Register</a>

<a href="results.html">Results</a>

</nav>

<button id="darkBtn">🌙</button>

</header>

<section class="container">

<div class="card">

<h2>🔐 Voter Login</h2>

<input
type="text"
id="voterid"
placeholder="Enter Voter ID">

<input
type="password"
id="password"
placeholder="Enter Password">

<button onclick="loginUser()">

Login

</button>

<p id="msg"></p>

<br>

<p>

New User?

<a href="register.html">

Register Here

</a>

</p>

<br>

<p>

<a href="forgot.html">

Forgot Password?

</a>

</p>

</div>

</section>

<script src="script.js"></script>

<script>

function loginUser(){

let voterid=document.getElementById("voterid").value.trim();

let password=document.getElementById("password").value;

let msg=document.getElementById("msg");

let voter=JSON.parse(localStorage.getItem("voter"));

if(!voter){

msg.innerHTML="❌ Please register first.";

msg.style.color="red";

return;

}

if(voterid===voter.voterid && password===voter.password){

localStorage.setItem("loggedIn","true");

msg.innerHTML="✅ Login Successful";

msg.style.color="green";

setTimeout(function(){

window.location="dashboard.html";

},1500);

}
else{

msg.innerHTML="❌ Invalid Voter ID or Password";

msg.style.color="red";

}

}

</script>

</body>

</html>
