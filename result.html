<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Election Results</title>

<link rel="stylesheet" href="style.css">

<style>

.results{
max-width:900px;
margin:40px auto;
padding:20px;
}

.result-card{
background:#fff;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.progress{
width:100%;
height:25px;
background:#ddd;
border-radius:20px;
overflow:hidden;
margin-top:10px;
}

.bar{
height:100%;
background:#1565C0;
text-align:right;
padding-right:10px;
color:#fff;
line-height:25px;
font-weight:bold;
transition:width 1s;
}

#winner{
text-align:center;
font-size:28px;
font-weight:bold;
color:#1565C0;
margin:30px 0;
}

#totalVotes{
text-align:center;
font-size:20px;
margin-bottom:20px;
font-weight:bold;
}

.actions{
text-align:center;
margin-top:30px;
}

.actions button{
margin:10px;
}

</style>

</head>

<body>

<header>

<div class="logo">
🗳️ Smart Vote
</div>

<nav>

<a href="dashboard.html">Dashboard</a>

<a href="vote.html">Vote</a>

<a href="results.html">Results</a>

</nav>

<button id="darkBtn">🌙</button>

</header>

<h1 style="text-align:center;margin-top:30px;">
📊 Election Results
</h1>

<div id="winner"></div>

<div id="totalVotes"></div>

<div class="results" id="results"></div>

<div class="actions">

<button onclick="location.href='dashboard.html'">
🏠 Dashboard
</button>

<button onclick="resetElection()">
🔄 Reset Election
</button>

</div>

<script src="script.js"></script>

<script>

const votes = JSON.parse(localStorage.getItem("votes")) || {};

const results = document.getElementById("results");

let total = 0;

for(let candidate in votes){
total += votes[candidate];
}

document.getElementById("totalVotes").innerHTML =
"Total Votes : " + total;

let winner = "";
let highest = 0;

for(let candidate in votes){

let percent = total==0 ? 0 :
Math.round((votes[candidate]/total)*100);

results.innerHTML += `

<div class="result-card">

<h2>${candidate}</h2>

<p>Votes : ${votes[candidate]}</p>

<div class="progress">

<div class="bar"
style="width:${percent}%">

${percent}%

</div>

</div>

</div>

`;

if(votes[candidate] > highest){

highest = votes[candidate];

winner = candidate;

}

}

if(total==0){

document.getElementById("winner").innerHTML =
"❌ No votes have been cast.";

}
else{

document.getElementById("winner").innerHTML =
"🏆 Winner : " + winner;

}

function resetElection(){

if(confirm("Reset all election data?")){

localStorage.removeItem("votes");

localStorage.removeItem("voted");

alert("Election reset successfully!");

location.reload();

}

}

</script>

</body>
</html>
