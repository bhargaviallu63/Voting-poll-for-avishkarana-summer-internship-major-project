<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Election Results</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
padding:30px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.result-card{
background:white;
color:#333;
padding:20px;
border-radius:15px;
margin:20px auto;
max-width:700px;
box-shadow:0 10px 20px rgba(0,0,0,.3);
}

.row{
margin:20px 0;
}

.name{
font-weight:bold;
margin-bottom:8px;
}

.progress{
width:100%;
height:25px;
background:#ddd;
border-radius:20px;
overflow:hidden;
}

.bar{
height:100%;
background:#4CAF50;
width:0%;
color:white;
text-align:right;
padding-right:10px;
line-height:25px;
transition:1s;
}

#winner{
margin-top:30px;
text-align:center;
font-size:28px;
font-weight:bold;
color:yellow;
}

.buttons{
text-align:center;
margin-top:30px;
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.home{
background:#2196F3;
color:white;
}

.reset{
background:#f44336;
color:white;
}

button:hover{
opacity:.9;
}
</style>

</head>

<body>

<h1>📊 Election Results</h1>

<div class="result-card" id="results"></div>

<div id="winner"></div>

<div class="buttons">

<button class="home" onclick="location.href='index.html'">
🏠 Home
</button>

<button class="reset" onclick="resetElection()">
🔄 Reset Election
</button>

</div>

<script>

let votes = JSON.parse(localStorage.getItem("votes")) || {};

let resultDiv = document.getElementById("results");

let totalVotes = 0;

for(let c in votes){
totalVotes += votes[c];
}

let winner = "";
let highest = 0;

for(let c in votes){

let percentage = totalVotes == 0 ? 0 : Math.round((votes[c]/totalVotes)*100);

resultDiv.innerHTML += `
<div class="row">
<div class="name">${c} - ${votes[c]} Vote(s)</div>
<div class="progress">
<div class="bar" style="width:${percentage}%">
${percentage}%
</div>
</div>
</div>
`;

if(votes[c] > highest){
highest = votes[c];
winner = c;
}

}

if(totalVotes==0){

document.getElementById("winner").innerHTML="No votes have been cast yet.";

}else{

document.getElementById("winner").innerHTML=
"🏆 Winner: " + winner;

}

function resetElection(){

if(confirm("Are you sure you want to reset all votes?")){

localStorage.removeItem("votes");
localStorage.removeItem("voted");
localStorage.removeItem("loggedIn");

alert("Election has been reset.");

location.reload();

}

}

</script>

</body>
</html>
