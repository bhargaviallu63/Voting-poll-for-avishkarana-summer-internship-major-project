<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#4A00E0,#8E2DE2);
}

.container{
width:400px;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,.3);
}

h2{
text-align:center;
color:#4A00E0;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#4A00E0;
color:white;
border:none;
border-radius:8px;
font-size:17px;
cursor:pointer;
}

button:hover{
background:#3200b3;
}

#message{
margin-top:20px;
text-align:center;
font-weight:bold;
}

a{
display:block;
text-align:center;
margin-top:20px;
text-decoration:none;
color:#4A00E0;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h2>🔑 Forgot Password</h2>

<input type="text" id="voterId" placeholder="Enter Voter ID">

<input type="email" id="email" placeholder="Enter Registered Email">

<button onclick="recoverPassword()">
Recover Password
</button>

<div id="message"></div>

<a href="login.html">
⬅ Back to Login
</a>

</div>

<script>

function recoverPassword(){

let voter=JSON.parse(localStorage.getItem("voter"));

let id=document.getElementById("voterId").value;
let email=document.getElementById("email").value;

if(voter &&
id===voter.voterid &&
email===voter.email){

document.getElementById("message").style.color="green";

document.getElementById("message").innerHTML=
"✅ Your Password is: <b>"+voter.password+"</b>";

}
else{

document.getElementById("message").style.color="red";

document.getElementById("message").innerHTML=
"❌ Voter ID or Email not found.";

}

}

</script>

</body>
</html>
