<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cast Your Vote</title>

<link rel="stylesheet" href="style.css">

<style>

#msg{
text-align:center;
font-size:22px;
font-weight:bold;
margin:20px;
}

.vote-card{
position:relative;
}

.badge{
position:absolute;
top:15px;
right:15px;
background:#1565C0;
color:white;
padding:5px 12px;
border-radius:20px;
font-size:14px;
font-weight:bold;
}

.vote-btn{
width:100%;
margin-top:15px;
}

</style>

</head>

<body onload="checkLogin();checkVoteStatus()">

<header>

<div class="logo">
🗳️ Smart Vote
</div>

<nav>

<a href="dashboard.html">Dashboard</a>

<a href="candidate.html">Candidates</a>

<a href="vote.html">Vote</a>

<a href="results.html">Results</a>

</nav>

<button id="darkBtn">🌙</button>

</header>

<h1 style="text-align:center;margin-top:25px;">
Cast Your Vote
</h1>

<div id="msg"></div>

<div class="cards">

<div class="card vote-card">

<div class="badge">🌾</div>

<img src="https://via.placeholder.com/120">

<h2>Rahul Sharma</h2>

<p>Future Development Party</p>

<button class="vote-btn"
onclick="vote('Rahul Sharma')">

🗳️ Vote

</button>

</div>

<div class="card vote-card">

<div class="badge">🌸</div>

<img src="https://via.placeholder.com/120">

<h2>Priya Reddy</h2>

<p>People's Voice Party</p>

<button class="vote-btn"
onclick="vote('Priya Reddy')">

🗳️ Vote

</button>

</div>

<div class="card vote-card">

<div class="badge">🚲</div>

<img src="https://via.placeholder.com/120">

<h2>Arjun Kumar</h2>

<p>National Progress Party</p>

<button class="vote-btn"
onclick="vote('Arjun Kumar')">

🗳️ Vote

</button>

</div>

<div class="card vote-card">

<div class="badge">✋</div>

<img src="https://via.placeholder.com/120">

<h2>Sneha Patel</h2>

<p>United Citizens Party</p>

<button class="vote-btn"
onclick="vote('Sneha Patel')">

🗳️ Vote

</button>

</div>

</div>

<footer>

© 2026 Smart Online Voting System

</footer>

<script src="script.js"></script>

<script>

function checkVoteStatus(){

if(localStorage.getItem("voted")=="yes"){

document.getElementById("msg").innerHTML=
"✅ You have already cast your vote.";

setTimeout(function(){

window.location="results.html";

},2000);

}

}

function vote(candidate){

if(localStorage.getItem("voted")=="yes"){

alert("You have already voted.");

return;

}

if(confirm("Confirm your vote for "+candidate+" ?")){

let votes=JSON.parse(localStorage.getItem("votes"))||{};

if(!votes[candidate]){

votes[candidate]=0;

}

votes[candidate]++;

localStorage.setItem("votes",JSON.stringify(votes));

localStorage.setItem("voted","yes");

document.getElementById("msg").innerHTML=
"🎉 Thank you! Your vote has been recorded successfully.";

setTimeout(function(){

window.location="results.html";

},2000);

}

}

</script>

</body>
</html>
