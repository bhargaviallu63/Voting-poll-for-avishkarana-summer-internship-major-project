
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cast Your Vote</title>

<link rel="stylesheet" href="style.css">

<style>

.notice{
text-align:center;
font-size:20px;
margin:20px;
font-weight:bold;
color:#1565C0;
}

.vote-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
padding:30px;
}

.card img{
width:120px;
height:120px;
border-radius:50%;
}

.symbol{
font-size:35px;
margin:10px 0;
}

</style>

</head>

<body onload="loadVotePage()">

<header>

<div class="logo">🗳️ Smart Vote</div>

<nav>

<a href="dashboard.html">Dashboard</a>

<a href="candidate.html">Candidates</a>

<a href="results.html">Results</a>

<a href="profile.html">Profile</a>

</nav>

<button id="darkBtn">🌙</button>

</header>

<div class="notice" id="status">
Select one candidate and cast your vote.
</div>

<div class="vote-grid">

<div class="card">

<img src="https://via.placeholder.com/120" alt="Candidate">

<h2>Rahul Sharma</h2>

<p>Future Development Party</p>

<div class="symbol">🌾</div>

<button onclick="vote('Rahul Sharma')">
🗳️ Vote
</button>

</div>

<div class="card">

<img src="https://via.placeholder.com/120" alt="Candidate">

<h2>Priya Reddy</h2>

<p>People's Voice Party</p>

<div class="symbol">🌸</div>

<button onclick="vote('Priya Reddy')">
🗳️ Vote
</button>

</div>

<div class="card">

<img src="https://via.placeholder.com/120" alt="Candidate">

<h2>Arjun Kumar</h2>

<p>National Progress Party</p>

<div class="symbol">🚲</div>

<button onclick="vote('Arjun Kumar')">
🗳️ Vote
</button>

</div>

<div class="card">

<img src="https://via.placeholder.com/120" alt="Candidate">

<h2>Sneha Patel</h2>

<p>United Citizens Party</p>

<div class="symbol">✋</div>

<button onclick="vote('Sneha Patel')">
🗳️ Vote
</button>

</div>

</div>

<script src="script.js"></script>

<script>

function loadVotePage(){

checkLogin();

if(localStorage.getItem("voted")=="yes"){

document.getElementById("status").innerHTML=
"✅ You have already voted.";

setTimeout(function(){

window.location="results.html";

},2000);

}

}

function vote(candidate){

if(localStorage.getItem("voted")=="yes"){

alert("You have already voted.");

return;

}

if(confirm("Confirm your vote for " + candidate + "?")){

let votes=JSON.parse(localStorage.getItem("votes"))||{};

votes[candidate]=(votes[candidate]||0)+1;

localStorage.setItem("votes",JSON.stringify(votes));

localStorage.setItem("voted","yes");

alert("🎉 Your vote has been recorded successfully!");

window.location="results.html";

}

}

</script>

</body>
</html>
