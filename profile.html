<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Profile</title>

<link rel="stylesheet" href="style.css">

<style>

.profile-card{
max-width:500px;
margin:40px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
text-align:center;
}

.avatar{
width:120px;
height:120px;
background:#1565C0;
color:white;
font-size:50px;
display:flex;
justify-content:center;
align-items:center;
border-radius:50%;
margin:auto;
margin-bottom:20px;
}

.info{
text-align:left;
margin-top:20px;
}

.info p{
margin:12px 0;
font-size:18px;
}

.buttons{
margin-top:30px;
}

.buttons button{
margin:10px;
padding:12px 20px;
}

.status{
font-weight:bold;
color:green;
}

</style>

</head>

<body onload="loadProfile()">

<header>

<div class="logo">
🗳️ Smart Vote
</div>

<nav>

<a href="dashboard.html">Dashboard</a>

<a href="vote.html">Vote</a>

<a href="results.html">Results</a>

<a href="profile.html">Profile</a>

</nav>

<button id="darkBtn">🌙</button>

</header>

<div class="profile-card">

<div class="avatar">
👤
</div>

<h2 id="name">Voter Name</h2>

<div class="info">

<p>
<b>Email :</b>
<span id="email"></span>
</p>

<p>
<b>Voter ID :</b>
<span id="voterid"></span>
</p>

<p>
<b>Voting Status :</b>
<span id="status" class="status"></span>
</p>

</div>

<div class="buttons">

<button onclick="location.href='vote.html'">

🗳️ Vote Now

</button>

<button onclick="logout()">

🚪 Logout

</button>

</div>

</div>

<script src="script.js"></script>

<script>

function loadProfile(){

checkLogin();

let voter=JSON.parse(localStorage.getItem("voter"));

if(voter){

document.getElementById("name").innerHTML=voter.name;

document.getElementById("email").innerHTML=voter.email;

document.getElementById("voterid").innerHTML=voter.voterid;

}

if(localStorage.getItem("voted")=="yes"){

document.getElementById("status").innerHTML="✅ Voted";

}
else{

document.getElementById("status").innerHTML="❌ Not Voted";

document.getElementById("status").style.color="red";

}

}

</script>

</body>

</html>
