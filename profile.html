<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voter Profile</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#2193b0,#6dd5ed);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#fff;
width:420px;
padding:30px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,.3);
text-align:center;
}

.avatar{
width:120px;
height:120px;
border-radius:50%;
background:#1565C0;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
font-size:48px;
margin:0 auto 20px;
}

h2{
color:#1565C0;
margin-bottom:20px;
}

.info{
text-align:left;
margin:15px 0;
font-size:18px;
}

.info span{
font-weight:bold;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
color:white;
}

.vote{
background:#2E7D32;
}

.logout{
background:#D32F2F;
}
</style>

</head>

<body>

<div class="card">

<div class="avatar">👤</div>

<h2>Voter Profile</h2>

<div class="info">
<span>Name:</span>
<p id="name">-</p>
</div>

<div class="info">
<span>Email:</span>
<p id="email">-</p>
</div>

<div class="info">
<span>Voter ID:</span>
<p id="id">-</p>
</div>

<button class="vote" onclick="location.href='vote.html'">
🗳️ Cast Vote
</button>

<button class="logout" onclick="logout()">
🚪 Logout
</button>

</div>

<script>

let voter = JSON.parse(localStorage.getItem("voter"));

if(voter){

document.getElementById("name").innerHTML=voter.name;
document.getElementById("email").innerHTML=voter.email;
document.getElementById("id").innerHTML=voter.voterid;

}else{

alert("Please Register First");

window.location="register.html";

}

function logout(){

localStorage.removeItem("loggedIn");

alert("Logged Out Successfully");

window.location="login.html";

}

</script>

</body>
</html>
