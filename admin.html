<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Vote - Admin Panel</title>

<link rel="stylesheet" href="style.css">

<style>

body{
background:#f4f7fc;
font-family:Arial,sans-serif;
}

.admin-login{
width:420px;
margin:60px auto;
background:#fff;
padding:30px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.2);
}

.admin-login h2{
text-align:center;
color:#1565C0;
margin-bottom:20px;
}

.admin-login input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

.admin-login button{
width:100%;
padding:12px;
background:#1565C0;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

.admin-login button:hover{
background:#0d47a1;
}

#adminPanel{
display:none;
padding:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:white;
padding:25px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.card h3{
color:#1565C0;
margin-bottom:10px;
}

table{
width:100%;
margin-top:30px;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#1565C0;
color:white;
}

.action-btn{
padding:8px 15px;
background:red;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.add-box{
margin-top:30px;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.add-box input{
padding:10px;
margin:8px;
width:220px;
}

.add-box button{
padding:10px 20px;
background:#2E7D32;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<div class="logo">
🛠 Smart Vote Admin
</div>

<nav>

<a href="dashboard.html">Dashboard</a>

<a href="results.html">Results</a>

<a href="index.html">Home</a>

</nav>

<button id="darkBtn">🌙</button>

</header>

<div class="admin-login" id="loginBox">

<h2>🔐 Admin Login</h2>

<input
type="text"
id="adminUser"
placeholder="Username">

<input
type="password"
id="adminPass"
placeholder="Password">

<button onclick="loginAdmin()">
Login
</button>

<p id="msg"></p>

</div>

<div id="adminPanel">

<h1 style="text-align:center;">
Admin Dashboard
</h1>

<div class="cards">

<div class="card">
<h3>Total Votes</h3>
<h1 id="votesCount">0</h1>
</div>

<div class="card">
<h3>Total Candidates</h3>
<h1 id="candidateCount">4</h1>
</div>

<div class="card">
<h3>Election Status</h3>
<h1 style="color:green;">ACTIVE</h1>
</div>

<div class="card">
<h3>Reset</h3>
<button onclick="resetElection()">
Reset Election
</button>
</div>

</div>
<div class="add-box">

<h2>Add Candidate</h2>

<input type="text" id="candidateName" placeholder="Candidate Name">

<input type="text" id="partyName" placeholder="Party Name">

<button onclick="addCandidate()">

Add Candidate

</button>

</div>

<table id="candidateTable">

<tr>

<th>Candidate</th>

<th>Party</th>

<th>Action</th>

</tr>

</table>

</div>

<script src="script.js"></script>

<script>

let candidates = JSON.parse(localStorage.getItem("candidates")) || [

{name:"Rahul Sharma",party:"Future Development Party"},

{name:"Priya Reddy",party:"People's Voice Party"},

{name:"Arjun Kumar",party:"National Progress Party"},

{name:"Sneha Patel",party:"United Citizens Party"}

];

function loginAdmin(){

let user=document.getElementById("adminUser").value;

let pass=document.getElementById("adminPass").value;

if(user==="admin" && pass==="admin123"){

document.getElementById("loginBox").style.display="none";

document.getElementById("adminPanel").style.display="block";

displayCandidates();

loadStats();

}else{

document.getElementById("msg").innerHTML="❌ Invalid Username or Password";

document.getElementById("msg").style.color="red";

}

}

function displayCandidates(){

let table=document.getElementById("candidateTable");

table.innerHTML=`

<tr>

<th>Candidate</th>

<th>Party</th>

<th>Action</th>

</tr>

`;

candidates.forEach(function(c,index){

table.innerHTML+=`

<tr>

<td>${c.name}</td>

<td>${c.party}</td>

<td>

<button class="action-btn"

onclick="deleteCandidate(${index})">

Delete

</button>

</td>

</tr>

`;

});

document.getElementById("candidateCount").innerHTML=candidates.length;

}
  function addCandidate(){

let name=document.getElementById("candidateName").value.trim();

let party=document.getElementById("partyName").value.trim();

if(name=="" || party==""){

alert("Please fill all fields.");

return;

}

candidates.push({

name:name,

party:party

});

localStorage.setItem("candidates",JSON.stringify(candidates));

displayCandidates();

document.getElementById("candidateName").value="";

document.getElementById("partyName").value="";

alert("Candidate Added Successfully.");

}

function deleteCandidate(index){

if(confirm("Delete this candidate?")){

candidates.splice(index,1);

localStorage.setItem("candidates",JSON.stringify(candidates));

displayCandidates();

}

}

function loadStats(){

let votes=JSON.parse(localStorage.getItem("votes"))||{};

let total=0;

for(let candidate in votes){

total+=votes[candidate];

}

document.getElementById("votesCount").innerHTML=total;

}

function resetElection(){

if(confirm("Reset Election Data?")){

localStorage.removeItem("votes");

localStorage.removeItem("voted");

alert("Election Reset Successfully.");

location.reload();

}

}

</script>

</body>

</html>
