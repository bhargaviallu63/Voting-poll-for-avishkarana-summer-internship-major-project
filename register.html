<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Voter Registration</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="logo">
🗳️ Smart Vote
</div>

<nav>

<a href="index.html">Home</a>

<a href="login.html">Login</a>

<a href="register.html">Register</a>

<a href="results.html">Results</a>

</nav>

<button id="darkBtn">🌙</button>

</header>

<section class="container">

<div class="card">

<h2>📝 Voter Registration</h2>

<input
type="text"
id="name"
placeholder="Full Name">

<input
type="email"
id="email"
placeholder="Email Address">

<input
type="text"
id="voterid"
placeholder="Voter ID">

<input
type="password"
id="password"
placeholder="Create Password">

<input
type="password"
id="confirm"
placeholder="Confirm Password">

<button onclick="registerUser()">

Register

</button>

<p id="msg"></p>

<br>

<p>

Already Registered?

<a href="login.html">

Login Here

</a>

</p>

</div>

</section>

<script src="script.js"></script>

<script>

function registerUser(){

let name=document.getElementById("name").value.trim();

let email=document.getElementById("email").value.trim();

let voterid=document.getElementById("voterid").value.trim();

let password=document.getElementById("password").value;

let confirm=document.getElementById("confirm").value;

let msg=document.getElementById("msg");

if(name=="" || email=="" || voterid=="" || password=="" || confirm==""){

msg.innerHTML="❌ Please fill all fields.";

msg.style.color="red";

return;

}

if(password.length<6){

msg.innerHTML="❌ Password must contain at least 6 characters.";

msg.style.color="red";

return;

}

if(password!=confirm){

msg.innerHTML="❌ Passwords do not match.";

msg.style.color="red";

return;

}

let voter={

name:name,

email:email,

voterid:voterid,

password:password

};

localStorage.setItem("voter",JSON.stringify(voter));

msg.innerHTML="✅ Registration Successful!";

msg.style.color="green";

setTimeout(function(){

window.location="login.html";

},1500);

}

</script>

</body>

</html>
